<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>重定向中...</title>
    <script>
      const params = new URLSearchParams(window.location.search);
      const batchId = params.get('batch_id');
      if (batchId) {
        window.location.replace(`/reconciliation/batches/${encodeURIComponent(batchId)}`);
      } else {
        window.location.replace('/reconciliation');
      }
    </script>
  </head>
  <body>正在跳转到 React 对账详情页...</body>
</html>
