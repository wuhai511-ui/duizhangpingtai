<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>对账管理</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --card: #ffffff;
        --line: #e7edf5;
        --text: #1f2a44;
        --muted: #6f7b91;
        --primary: #1677ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        color: var(--text);
        background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      }

      .page {
        max-width: 1440px;
        margin: 0 auto;
        padding: 24px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 20px;
      }

      .title {
        margin: 0 0 8px;
        font-size: 30px;
        font-weight: 700;
      }

      .sub {
        color: var(--muted);
        font-size: 14px;
      }

      .button {
        border: 0;
        border-radius: 10px;
        padding: 10px 16px;
        cursor: pointer;
        background: var(--primary);
        color: #fff;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 18px;
        box-shadow: 0 10px 30px rgba(31, 42, 68, 0.05);
      }

      .toolbar {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }

      .select {
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: #fff;
        min-width: 160px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        text-align: left;
        padding: 12px 10px;
        border-bottom: 1px solid var(--line);
        font-size: 14px;
      }

      th {
        color: var(--muted);
        background: #fafcff;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 12px;
        background: #eef4ff;
        color: var(--primary);
      }

      .link-btn {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
      }

      .state {
        padding: 32px 20px;
        text-align: center;
        color: var(--muted);
      }

      @media (max-width: 760px) {
        .page {
          padding: 16px;
        }

        .header {
          flex-direction: column;
          align-items: stretch;
        }

        .table-wrap {
          overflow-x: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="header">
        <div>
          <h1 class="title">对账管理</h1>
          <div class="sub">集中查看所有对账批次，并从这里进入统一的对账详情页。</div>
        </div>
        <button class="button" onclick="location.href='/'">返回首页</button>
      </div>

      <div class="card">
        <div class="toolbar">
          <select id="batchType" class="select">
            <option value="">全部类型</option>
            <option value="ORDER_VS_JY">业务订单 vs JY</option>
            <option value="JY_VS_JS">JY vs JS</option>
          </select>
          <select id="status" class="select">
            <option value="">全部状态</option>
            <option value="0">待处理</option>
            <option value="1">处理中</option>
            <option value="2">完成</option>
            <option value="3">失败</option>
          </select>
        </div>
        <div id="table" class="table-wrap">
          <div class="state">正在加载批次列表...</div>
        </div>
      </div>
    </div>

    <script>
      const batchTypeSelect = document.getElementById('batchType');
      const statusSelect = document.getElementById('status');
      const table = document.getElementById('table');

      function statusLabel(value) {
        const map = {
          0: '待处理',
          1: '处理中',
          2: '完成',
          3: '失败',
        };
        return map[value] || String(value);
      }

      async function request(path) {
        const response = await fetch(`/api/v1${path}`, {
          headers: { Accept: 'application/json' },
        });
        if (!response.ok) {
          const text = await response.text();
          throw new Error(text || `HTTP ${response.status}`);
        }
        return response.json();
      }

      function renderTable(items) {
        if (!items.length) {
          table.innerHTML = '<div class="state">暂无对账批次。</div>';
          return;
        }

        table.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>批次号</th>
                <th>对账类型</th>
                <th>对账日期</th>
                <th>记录数</th>
                <th>匹配</th>
                <th>长款</th>
                <th>短款</th>
                <th>金额差异</th>
                <th>状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              ${items
                .map(
                  (item) => `
                    <tr>
                      <td>${item.batch_no || '-'}</td>
                      <td><span class="tag">${item.batch_type || '-'}</span></td>
                      <td>${item.check_date || '-'}</td>
                      <td>${item.record_count ?? 0}</td>
                      <td>${item.match_count ?? 0}</td>
                      <td>${item.long_count ?? 0}</td>
                      <td>${item.short_count ?? 0}</td>
                      <td>${item.amount_diff_count ?? 0}</td>
                      <td>${statusLabel(item.status)}</td>
                      <td><a class="link-btn" href="/reconciliation-batch.html?batch_id=${encodeURIComponent(item.id)}">查看明细</a></td>
                    </tr>
                  `,
                )
                .join('')}
            </tbody>
          </table>
        `;
      }

      async function load() {
        table.innerHTML = '<div class="state">正在加载批次列表...</div>';
        try {
          const params = new URLSearchParams({ page: '1', pageSize: '100' });
          if (batchTypeSelect.value) params.set('batchType', batchTypeSelect.value);
          if (statusSelect.value) params.set('status', statusSelect.value);

          const response = await request(`/reconciliation/batches?${params.toString()}`);
          const payload = response.data;
          renderTable(payload.list || []);
        } catch (error) {
          table.innerHTML = `<div class="state">${error.message}</div>`;
        }
      }

      batchTypeSelect.addEventListener('change', load);
      statusSelect.addEventListener('change', load);
      load();
    </script>
  </body>
</html>
